; Car Swapper Configuration File
; This file defines your car swap presets, hotkeys, and plugin settings.
; 
; Format for presets: PresetName=SourceCar->TargetCar
; Available cars: octane, dominus, breakout, road_hog, x_devil, takumi, batmobile, 
;                 endo, mantis, imperator, diestro, nimbus, twinzer, cyclone, 
;                 centio, fennec, scarab, paladin, proteus, mclaren, ferrari, delorean

[CarSwaps]
; Define your car swaps here
; Example: Make your Octane look like a Dominus
Swap1=octane->dominus

; Example: Make your Octane look like a Fennec
Swap2=octane->fennec

; Add more swaps as needed (up to 10 total)
; Swap3=fennec->batmobile
; Swap4=dominus->breakout
; Swap5=octane->proteus

[Hotkeys]
; Virtual Key codes for preset hotkeys (Shift+Number by default)
; See: https://docs.microsoft.com/en-us/windows/win32/inputdev/virtual-key-codes
;
; Format: PresetNKey=<VirtualKeyCode>
; 
; Common keys:
; 48-57   = 0-9 (number keys)
; 65-90   = A-Z (letter keys)
; 112-123 = F1-F12 (function keys)
; 16 = Shift, 17 = Ctrl, 18 = Alt

; Preset hotkeys: Shift+0 through Shift+9
Preset0Key=48         ; Shift+0 → Preset 1
Preset1Key=49         ; Shift+1 → Preset 2
Preset2Key=50         ; Shift+2 → Preset 3
Preset3Key=51         ; Shift+3 → Preset 4
Preset4Key=52         ; Shift+4 → Preset 5
Preset5Key=53         ; Shift+5 → Preset 6
Preset6Key=54         ; Shift+6 → Preset 7
Preset7Key=55         ; Shift+7 → Preset 8
Preset8Key=56         ; Shift+8 → Preset 9
Preset9Key=57         ; Shift+9 → Preset 10

; Special hotkeys
ResetKey=48           ; Shift+0 → Reset to original car
ReloadKey=82          ; Shift+R → Reload this config file

; Modifier key (hold this + preset key)
ModifierKey=16        ; Shift (16) or Ctrl (17) or Alt (18)

[Settings]
; Plugin behavior settings

; Enable/disable console logging
EnableLogging=true

; Preserve camera offsets when swapping cars
; Set to false to let camera adjust automatically for new car model
PreserveCameraSettings=false

; Enable physics modifications when swapping
; Set to true to swap physics with the car model
; Set to false to keep original car physics
EnablePhysicsSwap=true

; Cooldown between swaps (in seconds) to prevent spam
SwapCooldownSeconds=0.1
